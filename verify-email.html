<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YumeVerse | Verificar correo</title>
  <meta name="description" content="Verifica tu correo para activar tu cuenta local de YumeVerse." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="bg-layer bg-1"></div>
    <div class="bg-layer bg-2"></div>
    <div class="bg-noise"></div>
  </div>

  <header class="header glass">
    <a class="brand" href="index.html">
      <span class="brand-mark">YV</span>
      <span class="brand-text">YumeVerse</span>
    </a>
    <nav class="nav">
      <a href="index.html#tendencias">Tendencias</a>
      <a href="index.html#temporada">Temporada</a>
      <a href="index.html#top">Top</a>
      <a href="index.html#generos">Generos</a>
    </nav>
    <div class="header-tools">
      <a id="profileLink" class="profile-link" href="profile.html" aria-label="Mi perfil" title="Mi perfil">
        <img id="profileAvatar" class="profile-avatar" alt="Mi perfil" hidden />
        <span id="profileLogo" class="profile-logo">YV</span>
        <span id="profileLabel" class="profile-label">Iniciar sesion</span>
      </a>
    </div>
  </header>

  <main class="container profile-page">
    <section class="section">
      <div class="section-head">
        <h2>Verificar correo</h2>
        <p>Estamos activando tu cuenta local.</p>
      </div>
      <div class="security-box glass">
        <p id="verifyHint" class="empty-note">Validando enlace de verificacion...</p>
        <div class="security-actions">
          <a id="verifyProfileLink" class="btn btn-primary" href="profile.html" hidden>Ir a mi perfil</a>
          <a id="verifyHomeLink" class="btn btn-ghost" href="index.html">Volver al inicio</a>
        </div>
        <p id="verifyMessage" class="auth-message"></p>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="verify-email.js"></script>
</body>
</html>
