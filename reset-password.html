<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YumeVerse | Restablecer contrasena</title>
  <meta name="description" content="Restablece tu contrasena de YumeVerse de forma segura." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="bg-layer bg-1"></div>
    <div class="bg-layer bg-2"></div>
    <div class="bg-noise"></div>
  </div>

  <header class="header glass">
    <a class="brand" href="index.html">
      <span class="brand-mark">YV</span>
      <span class="brand-text">YumeVerse</span>
    </a>
    <nav class="nav">
      <a href="index.html#tendencias">Tendencias</a>
      <a href="index.html#temporada">Temporada</a>
      <a href="index.html#top">Top</a>
      <a href="index.html#generos">Generos</a>
    </nav>
    <div class="header-tools">
      <a id="profileLink" class="profile-link" href="profile.html" aria-label="Mi perfil" title="Mi perfil">
        <img id="profileAvatar" class="profile-avatar" alt="Mi perfil" hidden />
        <span id="profileLogo" class="profile-logo">YV</span>
        <span id="profileLabel" class="profile-label">Iniciar sesion</span>
      </a>
    </div>
  </header>

  <main class="container profile-page">
    <section class="section">
      <div class="section-head">
        <h2>Restablecer contrasena</h2>
        <p>Define una nueva contrasena para acceder a tu cuenta.</p>
      </div>
      <div class="security-box glass">
        <p id="resetHint" class="empty-note">Introduce tu nueva contrasena para confirmar el cambio.</p>
        <form id="resetForm" class="security-form">
          <label class="auth-label" for="resetPassword">Contrasena nueva</label>
          <input id="resetPassword" class="auth-input" type="password" autocomplete="new-password" required />
          <label class="auth-label" for="resetPasswordConfirm">Confirmar contrasena nueva</label>
          <input id="resetPasswordConfirm" class="auth-input" type="password" autocomplete="new-password" required />
          <button id="resetSubmit" class="btn btn-primary" type="submit">Guardar contrasena</button>
        </form>
        <p id="resetMessage" class="auth-message"></p>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
